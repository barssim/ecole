services:

  ecole-portal:
    build:
      context: ./ecole-portal
      dockerfile: Dockerfile
      target: test
    image: barssim/ecole-portal:test
    ports:
      - "8081:8081"
    volumes:
      - ./ecole-portal:/app
      - /app/node_modules
    networks:
      - ecole
    environment:
      - REACT_APP_API_GATEWAY_URL=http://api-gateway:8085

networks:
  ecole:
    external: true
