server:
  port: 8085
  address: 0.0.0.0

spring:
  profiles:
    active: prod   # change to production

  main:
    web-application-type: reactive

  cloud:
    gateway:

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://ecole-portal:80"
              - "http://ecole-portal-dev:8080"
              - "http://ecole-portal-test:8081"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      httpclient:
        wiretap: false  # disable wiretap in prod
        connectTimeout: 30000  # 30 seconds
        responseTimeout: 60000  # 60 seconds

      httpserver:
        wiretap: false

      websocket:
        max-frame-payload-size: 100KB

      routes:

        - id: usermanagement
          uri: "http://usermanagement:8091"
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: finance-manager
          uri: "http://finance-manager:8094"
          predicates:
            - Path=/api/facture/**
          filters:
            - StripPrefix=0

        - id: attestation-service
          uri: "http://attestation-service:8095"
          predicates:
            - Path=/api/attestations,/api/attestations/**,/api/attestationsproduction,/api/attestationsproduction/**
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
