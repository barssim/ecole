services:

  ecole-portal:
    build:
      context: ./ecole-portal
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./ecole-portal:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_GATEWAY_URL: http://localhost:8085