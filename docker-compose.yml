services:

  mysql-user:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: userDB
    networks:
      - ecole

  mysql-fin:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: finDB
    networks:
      - ecole

  usermanagement:
    build: ./usermanagement
    depends_on:
      - mysql-user
    networks:
      - ecole

  finance-manager:
    build: ./finance-manager
    depends_on:
      - mysql-fin
    networks:
      - ecole

  eureka-server:
    build: ./eureka-server
    networks:
      - ecole

  api-gateway:
    build: ./solide-api-gateway
    depends_on:
      - usermanagement
      - finance-manager
    networks:
      - ecole

networks:
  ecole: