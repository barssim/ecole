name: Build & Deploy finance-manager app

on:
  push:
    branches:
      - main
    paths:
      - 'finance-manager/**'
      - '.github/workflows/finance-manager.yml'
      - 'docker-compose.yml'

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          mvn clean compile -f finance-manager/pom.xml
          mvn -B package -f finance-manager/pom.xml

      - name: Build Docker Image
        uses: docker/build-push-action@v2
        with:
          context: ./finance-manager
          dockerfile: ./finance-manager/Dockerfile
          push: false
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/finance-manager:latest

      - name: Login Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Push to Docker Hub
        uses: docker/build-push-action@v2
        with:
          context: ./finance-manager
          dockerfile: ./finance-manager/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/finance-manager:latest

      - name: Install SSH client
        run: sudo apt-get install -y openssh-client

      - name: Pull Docker image on server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/finance-manager:latest
            docker stop finance-manager || true
            docker rm finance-manager || true
            docker run -d --name finance-manager -p 8094:8094 ${{ secrets.DOCKER_HUB_USERNAME }}/finance-manager:latest
