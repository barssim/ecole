name: Build & Deploy finance-manager app

on:
  push:
    branches:
      - main
      - develop
      - test
    paths:
      - 'finance-manager/**'
      - '.github/workflows/finance-manager.yml'
      - 'docker-compose.yml'

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          cd finance-manager
          mvn clean compile
          mvn -B package --file pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./finance-manager
          file: ./finance-manager/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/finance-manager:latest

      - name: Deploy on server via Docker Compose
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ecole

            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}

            # ensure the Docker network used by docker-compose exists on the target host
            docker network inspect ecole >/dev/null 2>&1 || docker network create ecole

            docker compose pull finance-manager
            docker compose up -d finance-manager