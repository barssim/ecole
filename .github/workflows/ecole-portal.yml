name: Build & Deploy ecole-portal app

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ecole-portal/**'
      - '.github/workflows/ecole-portal.yml'
      - 'docker-compose.yml'

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build & Push (DEVELOP)
      - name: Build & Push Develop Image
        if: github.ref_name == 'develop'
        uses: docker/build-push-action@v5
        with:
          context: ./ecole-portal
          file: ./ecole-portal/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:develop
          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_TEST }}

      # Build & Push (MAIN)
      - name: Build & Push Production Image
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v5
        with:
          context: ./ecole-portal
          file: ./ecole-portal/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:latest
          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_PROD }}

  deploy:
    name: Deploy to Server (only main)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    steps:
      - name: Deploy on Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:latest

            docker stop ecole-portal || true
            docker rm ecole-portal || true

            docker run -d \
              --name ecole-portal \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:latest

            docker image prune -f