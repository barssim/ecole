name: Build & Deploy ecole-portal app

on:
  push:
    branches:
      - main
    paths:
      - 'ecole-portal/**'
      - '.github/workflows/ecole-portal.yml'
      - 'docker-compose.yml'

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Build & Push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./ecole-portal
          dockerfile: ./ecole-portal/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ecole_portal:latest

          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_TEST }}

      # Deploy on server
      - name: Deploy on Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/ecole_portal:latest

            docker stop ecole-portal || true
            docker rm ecole-portal || true

            docker run -d \
              --name ecole-portal \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/ecole_portal:latest

            docker image prune -af