name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - test

jobs:

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # =========================
      # MAIN (PRODUCTION)
      # =========================
      - name: Build & Push Production Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./ecole-portal
          file: ./ecole-portal/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:latest
          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_PROD }}

      # =========================
      # DEVELOP
      # =========================
      - name: Build & Push Develop Image
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: ./ecole-portal
          file: ./ecole-portal/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:develop
          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_TEST }}

      # =========================
      # TEST
      # =========================
      - name: Build & Push Test Image
        if: github.ref == 'refs/heads/test'
        uses: docker/build-push-action@v5
        with:
          context: ./ecole-portal
          file: ./ecole-portal/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:test
          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_TEST }}

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (Docker Compose)
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            cd /path/to/your/project

            git pull

            # Decide environment
            if [ "${{ github.ref_name }}" = "main" ]; then
              SERVICE=ecole-portal
            elif [ "${{ github.ref_name }}" = "develop" ]; then
              SERVICE=ecole-portal-dev
            else
              SERVICE=ecole-portal-test
            fi

            echo "Deploying service: $SERVICE"

            docker compose pull $SERVICE
            docker compose up -d $SERVICE

            docker image prune -f