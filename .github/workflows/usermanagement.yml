name : Build & Deploy usermanagement app

on:
  push:
    branches:
      - main
      - develop
      - test
    paths:
      - 'usermanagement/**'
      - '.github/workflows/usermanagement.yml'
      - 'docker-compose.yml'
      
jobs:
  build-deploy:
    name:  Build & Deploy
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20.x'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
          
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: 17
          
#      - name: Unit Tests
#        run: mvn -B test --file pom.xml
         
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-     
         
      - name: Build with Maven
        run: |
          mvn clean compile -f usermanagement/pom.xml
          mvn -B package -f usermanagement/pom.xml 
          
      - name: Build Docker Image
        uses: docker/build-push-action@v2
        with: 
          context: ./usermanagement
          dockerfile: ./usermanagement/Dockerfile
          push: false
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/usermanagement:latest
           
      - name: Login Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
            
      - name: Push to Docker Hub
        uses: docker/build-push-action@v2
        with: 
          context: ./usermanagement
          dockerfile: ./usermanagement/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/usermanagement:latest

      - name: Install SSH client
        run: sudo apt-get install -y openssh-client

      - name: Deploy with Docker Compose
        run: |
          docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}

          docker compose pull
          docker compose up -d --remove-orphans
           
