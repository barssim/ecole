name: Portal Build & Deploy

on:
  workflow_call:

jobs:
  build-deploy:
    name: Build & Deploy Portal
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '20.x'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v2
        with:
          context: ./ecole-portal
          dockerfile: ./ecole-portal/Dockerfile
          push: false
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:latest

      - name: Login Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Push to Docker Hub
        uses: docker/build-push-action@v2
        with:
          context: ./ecole-portal
          dockerfile: ./ecole-portal/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:latest
            docker stop ecole-portal || true
            docker rm ecole-portal || true
            docker run -d --name ecole-portal -p 80:3000 ${{ secrets.DOCKER_HUB_USERNAME }}/ecole-portal:latest
