name: Build & Deploy secretary-office app

on:
  push:
    branches:
      - main
      - develop
      - test
    paths:
      - 'secretary-office/**'
      - '.github/workflows/secretary-office.yml'
      - 'docker-compose.yml'

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build & Push (TEST)
      - name: Build & Push Test Image
        if: github.ref == 'refs/heads/test'
        uses: docker/build-push-action@v5
        with:
          context: ./secretary-office
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/secretary-office:test
          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_TEST }}

      # Build & Push (DEVELOP)
      - name: Build & Push Develop Image
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: ./secretary-office
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/secretary-office:develop
          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_DEV }}

      # Build & Push (MAIN / PRODUCTION)
      - name: Build & Push Production Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./secretary-office
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/secretary-office:latest
          build-args: |
            REACT_APP_API_GATEWAY_URL=${{ secrets.REACT_APP_API_GATEWAY_URL_PROD }}

  deploy:
    name: Deploy to Server (main + develop + test)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/test'

    steps:
      - name: Print branch
        run: echo ${{ github.ref_name }}

      - name: Deploy on Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            BRANCH="${{ github.ref_name }}"

            if [ "$BRANCH" = "main" ]; then
              IMAGE_TAG=latest
              CONTAINER_NAME=secretary-office
              PORT=80

            elif [ "$BRANCH" = "test" ]; then
              IMAGE_TAG=test
              CONTAINER_NAME=secretary-office-test
              PORT=8081

            else
              IMAGE_TAG=develop
              CONTAINER_NAME=secretary-office-dev
              PORT=8080
            fi

            # ensure the Docker network used by docker-compose (and other services) exists on the target host
            docker network inspect ecole >/dev/null 2>&1 || docker network create ecole

            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/secretary-office:$IMAGE_TAG

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            # run the portal container and attach it to the shared 'ecole' network so it can communicate
            # with other services if needed (and so service names resolve between containers)
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              --network ecole \
              -p $PORT:80 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/secretary-office:$IMAGE_TAG

            docker image prune -f