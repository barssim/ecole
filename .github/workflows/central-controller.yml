name: Central CI/CD Controller

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build/deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ecole-portal
          - solide-api-gateway
          - usermanagement
          - finance-manager
          - eureka-server

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      portal: ${{ steps.filter.outputs.portal }}
      gateway: ${{ steps.filter.outputs.gateway }}
      usermanagement: ${{ steps.filter.outputs.usermanagement }}
      finance: ${{ steps.filter.outputs.finance }}
      eureka: ${{ steps.filter.outputs.eureka }}
      any: ${{ steps.filter.outputs.any }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check for changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            portal:
              - 'ecole-portal/**'
            gateway:
              - 'solide-api-gateway/**'
            usermanagement:
              - 'usermanagement/**'
            finance:
              - 'finance-manager/**'
            eureka:
              - 'eureka-server/**'
            any:
              - '**'

  build-portal:
    needs: detect-changes
    if: needs.detect-changes.outputs.portal == 'true' || github.event.inputs.service == 'ecole-portal' || github.event.inputs.service == 'all'
    uses: ./.github/workflows/portal-workflow.yml

  build-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true' || github.event.inputs.service == 'solide-api-gateway' || github.event.inputs.service == 'all'
    uses: ./.github/workflows/gateway-workflow.yml

  build-usermanagement:
    needs: detect-changes
    if: needs.detect-changes.outputs.usermanagement == 'true' || github.event.inputs.service == 'usermanagement' || github.event.inputs.service == 'all'
    uses: ./.github/workflows/usermanagement-workflow.yml

  build-finance:
    needs: detect-changes
    if: needs.detect-changes.outputs.finance == 'true' || github.event.inputs.service == 'finance-manager' || github.event.inputs.service == 'all'
    uses: ./.github/workflows/finance-workflow.yml

  build-eureka:
    needs: detect-changes
    if: needs.detect-changes.outputs.eureka == 'true' || github.event.inputs.service == 'eureka-server' || github.event.inputs.service == 'all'
    uses: ./.github/workflows/eureka-workflow.yml

  notify:
    needs: [detect-changes, build-portal, build-gateway, build-usermanagement, build-finance, build-eureka]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          echo "Build completed!"
          echo "Portal: ${{ needs.build-portal.result }}"
          echo "Gateway: ${{ needs.build-gateway.result }}"
          echo "UserManagement: ${{ needs.build-usermanagement.result }}"
          echo "Finance: ${{ needs.build-finance.result }}"
          echo "Eureka: ${{ needs.build-eureka.result }}"
