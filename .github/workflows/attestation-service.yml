name: Build & Deploy attestation-service app

on:
  push:
    branches:
      - main
      - develop
      - test
    paths:
      - 'attestation-service'
      - 'attestation-service/**'
      - 'docker-compose*.yml'
      - '.gitmodules'
      - '.github/workflows/attestation-service.yml'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: false
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Workflow trigger info
        run: |
          echo "=== TRIGGER DEBUG INFO ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Modified files in this push:"
          git --no-pager diff --name-only ${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || echo "(not available for non-push events)"
          echo "=== END DEBUG ==="

      - name: Init attestation-service submodule (if needed)
        run: |
          if [ -f ".gitmodules" ] && grep -q "path = attestation-service" .gitmodules && [ ! -f "attestation-service/mvnw" ]; then
            git submodule sync -- attestation-service
            git submodule update --init --depth 1 attestation-service
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Resolve service path
        run: |
          if [ -f "attestation-service/mvnw" ]; then
            echo "SERVICE_DIR=attestation-service" >> "$GITHUB_ENV"
          elif [ -f "mvnw" ]; then
            echo "SERVICE_DIR=." >> "$GITHUB_ENV"
          else
            echo "::error::mvnw wurde weder in ./attestation-service noch im Repo-Root gefunden."
            echo "::error::Pruefe checkout-Konfiguration (z. B. submodules/sparse-checkout) und Repository-Inhalt."
            echo "--- pwd ---"
            pwd
            echo "--- top-level files ---"
            ls -la
            echo "--- mvnw/pom.xml candidates ---"
            find . -maxdepth 4 \( -name mvnw -o -name pom.xml \) -print
            exit 1
          fi

      - name: Build with Maven
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          chmod +x mvnw
          ./mvnw clean compile
          ./mvnw -B package --file pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.SERVICE_DIR }}
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/attestation-service:latest

      - name: Deploy on server via Docker Compose
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ecole

            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}

            # ensure the Docker network used by docker-compose exists on the target host
            docker network inspect ecole >/dev/null 2>&1 || docker network create ecole

            docker compose pull attestation-service
            docker compose up -d attestation-service

            docker image prune -a -f

